<!DOCTYPE html>
<html>
<head>
    <title>CardioPredict ❤️</title>

    <style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* 🔥 changed */
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        overflow-y: auto; /* 🔥 allows scrolling */
        color: #fff;
    }

    .container {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        width: 400px;
        margin-top: 20px;
        border: 1px solid #2a2a2a;
    }

    h1 {
        text-align: center;
        color: #ffffff;
    }

    label {
        font-size: 14px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 5px 0 15px 0;
        border-radius: 6px;
        border: 1px solid #333;
        background: #2c2c2c;
        color: #fff;
    }

    input:focus, select:focus {
        outline: none;
        border: 1px solid #007bff;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #0056b3;
    }

    #result {
        text-align: center;
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h1>CardioPredict ❤️</h1>

    Age:
    <input type="number" id="age">

    Sex:
    <select id="sex">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select>

    Chest Pain Type:
    <input type="number" id="cp">

    Resting BP:
    <input type="number" id="trestbps">

    Cholesterol:
    <input type="number" id="chol">

    Fasting Blood Sugar:
    <input type="number" id="fbs">

    Rest ECG:
    <input type="number" id="restecg">

    Max Heart Rate:
    <input type="number" id="thalach">

    Exercise Induced Angina:
    <input type="number" id="exang">

    Oldpeak:
    <input type="number" step="0.1" id="oldpeak">

    Slope:
    <input type="number" id="slope">

    CA:
    <input type="number" id="ca">

    Thal:
    <input type="number" id="thal">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const data = [
        Number(document.getElementById("age").value),
        Number(document.getElementById("sex").value),
        Number(document.getElementById("cp").value),
        Number(document.getElementById("trestbps").value),
        Number(document.getElementById("chol").value),
        Number(document.getElementById("fbs").value),
        Number(document.getElementById("restecg").value),
        Number(document.getElementById("thalach").value),
        Number(document.getElementById("exang").value),
        Number(document.getElementById("oldpeak").value),
        Number(document.getElementById("slope").value),
        Number(document.getElementById("ca").value),
        Number(document.getElementById("thal").value)
    ];

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        result.prediction === 1
        ? "⚠️ High Risk of Heart Disease ❤️"
        : "✅ Low Risk of Heart Disease 💚";
}
</script>

</body>
</html>
